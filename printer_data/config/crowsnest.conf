#### crowsnest.conf
#### This is the default config after installation.
#### It is also used as the default config in MainsailOS.
#### For details on how to configure this to your needs, see:
#### https://github.com/mainsail-crew/crowsnest/blob/v5/README.md


#####################################################################
####                                                            #####
####      Information about ports and according URL's           #####
####                                                            #####
#####################################################################
####                                                            #####
####    Port 8080 equals /webcam/?action=[stream/snapshot]      #####
####    Port 8081 equals /webcam2/?action=[stream/snapshot]     #####
####    Port 8082 equals /webcam3/?action=[stream/snapshot]     #####
####    Port 8083 equals /webcam4/?action=[stream/snapshot]     #####
####                                                            #####
####    Note: These ports are default for most Mainsail         #####
####    installations. Using any other port would involve       #####
####    changing the proxy configuration or using URLs          #####
####    with the specific port like                             #####
####    http://<ip>:<port>/?action=[stream/snapshot]            #####
####                                                            #####
#####################################################################


[crowsnest]
log_level: verbose                      # Valid Options are quiet/verbose/debug
rollover_on_start: false                # Creates a backup and clears the log on every restart, if set to true
no_proxy: true                         # If set to true, no reverse proxy is required. Only change this, if you know what you are doing.

[cam 1]
#mode: mjpg                              # mjpg/rtsp
mode: ustreamer                         # https://docs.mainsail.xyz/crowsnest/faq/backends
enable_rtsp: false                      # If camera-streamer is used, this enables also usage of an rtsp server
rtsp_port: 8003                        # Set different ports for each device!
port: 8080                              # HTTP/MJPG stream/snapshot port
device: /dev/v4l/by-id/usb-046d_0825_78D3E1B0-video-index0               # See log for available devices
resolution: 1280x720                     # <width>x<height> format
max_fps: 15                             # If hardware supports it, it will be forced, otherwise ignored/coerced.
#custom_flags:                          # You can run the stream services with custom flags.
#v4l2ctl:                               # Add v4l2-ctl parameters to set up your camera, see log for your camera capabilities.

[cam 2]
#mode: mjpg                              # mjpg/rtsp
mode: ustreamer                         # https://docs.mainsail.xyz/crowsnest/faq/backends
enable_rtsp: false                      # If camera-streamer is used, this enables also usage of an rtsp server
rtsp_port: 8004                        # Set different ports for each device!
port: 8081                              # HTTP/MJPG stream/snapshot port
device: /dev/v4l/by-id/usb-046d_0825_BE2C4750-video-index0                     # See log for available devices
resolution: 1280x720                     # <width>x<height> format
max_fps: 15                             # If hardware supports it, it will be forced, otherwise ignored/coerced.
#custom_flags:                          # You can run the stream services with custom flags.
#v4l2ctl:                               # Add v4l2-ctl parameters to set up your camera, see log for your camera capabilities.

[cam 3]
#mode: mjpg                              # mjpg/rtsp
mode: ustreamer                         # https://docs.mainsail.xyz/crowsnest/faq/backends
enable_rtsp: false                      # If camera-streamer is used, this enables also usage of an rtsp server
rtsp_port: 8005                        # Set different ports for each device!
port: 8082                              # HTTP/MJPG stream/snapshot port
device: /dev/v4l/by-id/usb-WCM_USB_WEB_CAM-video-index0                     # See log for available devices
resolution: 1280x720                     # <width>x<height> format
max_fps: 15                             # If hardware supports it, it will be forced, otherwise ignored/coerced.
#custom_flags:                          # You can run the stream services with custom flags.
#v4l2ctl:                               # Add v4l2-ctl parameters to set up your camera, see log for your camera capabilities.