# This file contains common pin mappings for the BIGTREETECH SKR V1.4
# board. To use this config, the firmware should be compiled for the
# LPC1768 or LPC1769(Turbo).

# See docs/Config_Reference.md for a description of parameters.


[include mainsail.cfg]

[virtual_sdcard]
path: /home/drnuke/printer_1_data/gcodes
on_error_gcode: CANCEL_PRINT


#Macros

[display_status]

[pause_resume]

[gcode_macro START_PRINT]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
  M140 S{BED_TEMP} ; set bed temp
  M190 S{BED_TEMP} ; wait for bed temp
  ; Ender 3 Custom Start G-code
  G92 E0 ; Reset Extruder
  G28 X Y; Home X Y
  M190 S{BED_TEMP} ; wait for bed temp
  G28 Z ; Home Z
  BED_MESH_PROFILE LOAD=default
  G1 Z10.0 F3000 ; Move Z Axis up a little to prevent scratching of Heat Bed
  M104 S{EXTRUDER_TEMP} ; set extruder temp
  M109 S{EXTRUDER_TEMP} ; wait for extruder temp
  G1 Z2.0 F3000 ; Move Z Axis up a little to prevent scratching of Heat Bed
  G1 X0.1 Y20 Z0.3 F5000.0 ; Move to start position
  G1 X0.1 Y200.0 Z0.3 F1500.0 E15 ; Draw the first line
  G1 X0.4 Y200.0 Z0.3 F5000.0 ; Move to side a little
  G1 X0.4 Y20 Z0.3 F1500.0 E30 ; Draw the second line
  G92 E0 ; Reset Extruder
  G1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
  G1 X5 Y20 Z0.3 F5000.0 ; Move over to prevent blob squish
  G92 E0.0

[gcode_macro END_PRINT]
gcode:
  M83 ; Relative E
  G91 ;Relative positioning
  G1 E-2 F2700 ;Retract a bit
  G1 E-2 Z0.2 F2400 ;Retract and raise Z
  G1 X5 Y5 F3000 ;Wipe out
  G1 Z10 ;Raise Z more
  G90 ;Absolute positioning

  G1 X0 Y220 ;Present print
  M106 S0 ;Turn-off fan
  M104 S0 ;Turn-off hotend
  M140 S0 ;Turn-off bed

  M84 X Y E ;Disable all steppers but Z


[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE

# change this if you need more or less extrusion
variable_extrude: 1.0
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg
  {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
      {% set z_safe = 2.0 %}
  {% else %}
      {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}  
  RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
  G91
  G1 z10 F600
  G90

[gcode_macro BED_MESH]
description: run bed mesh calibration
gcode:
  G28 # home all axis
  M190 S60 # set bed temp
  G4 P300000 # pause for 5 minutes (300000 milliseconds)
  BED_MESH_CALIBRATE # run bed probe to create mesh


[gcode_macro BED_MESH_QUICK]
description: run bed mesh calibration
gcode:
  G28 # home all axis
  M190 S60 # set bed temp
  G4 P30000 # pause for 30 seconds (30000 milliseconds)
  BED_MESH_CALIBRATE # run bed probe to create mesh

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True



[stepper_x]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop #!P1.29
position_endstop: -16
position_max: 220
position_min: -16
homing_speed: 50
homing_retract_dist: 0


[tmc2209 stepper_x]
uart_pin: P1.10
run_current: 0.800 # Marlin hat 580; geändert auf 600, 700, 800
diag_pin: ^P1.29 # StallGuard Detect Pin (Endstopp-Erkennung)
Driver_SGTHRS: 80 # StallGuard Threshold (Empfindlichkeit)
#interpolate: false# TMC2209 verwendet kein internes Mikroschrittverfahren von 256 (Standard = True)
Stealthchop_threshold: 999999


[stepper_y]
step_pin: P0.19
dir_pin: !P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop #!P1.28
position_endstop: -25
position_max: 220
position_min: -25
homing_speed: 50
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: P1.9
run_current: 0.800 # Marlin hat 650; geändert auf 700, 800
diag_pin: ^P1.28 # StallGuard Detect Pin (Endstopp-Erkennung)
Driver_SGTHRS: 100 # StallGaurd Threshold (Empfindlichkeit)
#interpolate: false# TMC2209 verwendet kein internes Mikroschrittverfahren von 256 (Standard = True)
Stealthchop_threshold: 999999

[stepper_z]
step_pin: P0.22
dir_pin: P2.11
enable_pin: !P0.21
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0
position_max: 260
position_min: -10

[bltouch]
sensor_pin: P1.27 # Weißer Draht (an der Sonde)
control_pin: P2.0 # Gelber Draht (auf Servos)
x_offset: -59.00 # von Marlin übertragene Werte (NOZZLE_TO_PROBE_OFFSET)
y_offset: -5.00 # von Marlin übertragene Werte (NOZZLE_TO_PROBE_OFFSET)
samples: 2
sample_retract_dist: 5
samples_tolerance: 0.03
samples_tolerance_retries: 5
samples_result: average #median
speed: 2
z_offset: 0 #this will get calculated and commented out after calibration


[safe_z_home]

home_xy_position: 169,110 # Change coordinates to the center of your print bed
speed: 50
z_hop: 10                 # Move up 10mm
z_hop_speed: 5

[tmc2209 stepper_z]
uart_pin: P1.8
run_current: 0.800 # Marlin hat 580; geändert zu
#interpolate: false# TMC2209 verwendet kein internes Mikroschrittverfahren von 256 (Standard = True)
#Stealthchop_threshold: 999999

[bed_mesh]

speed: 80
horizontal_move_z: 7
mesh_min: 15, 15 #this will likely be a good starting pos
mesh_max: 190, 190  #this will need to be calculated
probe_count: 3,3 #number of x,y probing points
mesh_pps: 2,2 #number of points to interpret between each probing point
fade_start: 1 #height in millimeters to begin fading out the applied effect of the mesh
fade_end: 5 #height in millimeters to end the applied effect of the mesh. If you want to disable fade make this value lower than the value of fade_start
fade_target: 0
algorithm: bicubic
bicubic_tension: .2

[extruder]
step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: P2.7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.24
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 260

#[extruder1]
#step_pin: P1.15
#dir_pin: P1.14
#enable_pin: !P1.16
#heater_pin: P2.4
#sensor_pin: P0.23
#...

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.25
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[heater_fan extruder_fan]
pin: P2.4  # Ersetzen Sie dies durch Ihren spezifischen Lüfter-Pin
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[fan]
pin: P2.3

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1768_1FD0FF0BE3BC07AE198D5B67872100F5-if00

[printer]
kinematics: cartesian
max_velocity: 400
max_accel: 500
max_z_velocity: 10
max_z_accel: 100

[display]
lcd_type: st7920
cs_pin: EXP1_4
sclk_pin: EXP1_5
sid_pin: EXP1_3
encoder_pins: ^EXP2_3, ^EXP2_5
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

